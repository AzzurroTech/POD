version: '3.8'

services:
  pod-dbms:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pod-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Persist the storage directory (index.json and data/)
      # This ensures data survives container restarts/recreations
      - pod-data:/app/storage
    environment:
      - TZ=UTC
    networks:
      - pod-network

networks:
  pod-network:
    driver: bridge

volumes:
  pod-data:
    driver: local